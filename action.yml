name: 'Alpacon Websh Action'
description: 'Executes a command on a target server using alpacon websh.'
author: sangyeong01

branding:
  icon: 'terminal'
  color: 'blue'

inputs:
  workspace-url:
    description: 'Your AlpacaX workspace URL.'
    required: true
  api-token:
    description: 'Alpacon API Token for login.'
    required: true
  target:
    description: 'The target server name.'
    required: true
  script:
    description: 'The script or command to execute.'
    required: true
  username:
    description: 'Username to execute the command as (e.g., root, ubuntu).'
    required: false
  groupname:
    description: 'Group name to execute the command as.'
    required: false

runs:
  using: "composite"
  steps:
    - name: Login to Alpacon
      run: alpacon login ${{ inputs.workspace-url }} -t ${{ inputs.api-token }}
      shell: bash
    - name: Execute Websh
      run: |
        # Validate groupname requires username
        if [[ -z "${{ inputs.username }}" && -n "${{ inputs.groupname }}" ]]; then
          echo "Error: groupname requires username to be specified"
          exit 1
        fi

        # Process multi-line script by executing each non-empty line
        IFS=$'\n'
        while read -r line; do
          # Skip empty lines and comments
          if [[ -n "$line" && ! "$line" =~ ^[[:space:]]*# ]]; then
            echo "Executing: $line"

            # Build command with optional user/group flags
            if [[ -n "${{ inputs.username }}" && -n "${{ inputs.groupname }}" ]]; then
              alpacon websh -u "${{ inputs.username }}" -g "${{ inputs.groupname }}" ${{ inputs.target }} "$line"
            elif [[ -n "${{ inputs.username }}" ]]; then
              alpacon websh -u "${{ inputs.username }}" ${{ inputs.target }} "$line"
            else
              alpacon websh ${{ inputs.target }} "$line"
            fi
          fi
        done <<< '${{ inputs.script }}'
      shell: bash