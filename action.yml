name: 'Alpacon Websh Action'
description: 'Executes a command on a target server using alpacon websh.'
author: sangyeong01

branding:
  icon: 'terminal'
  color: 'blue'

inputs:
  workspace-url:
    description: 'Your Alpacon workspace URL.'
    required: true
  api-token:
    description: 'Alpacon API Token for login.'
    required: true
  target:
    description: 'The target server name.'
    required: true
  script:
    description: 'The script or command to execute.'
    required: true
  username:
    description: 'Username to execute the command as (e.g., root, ubuntu).'
    required: false
  groupname:
    description: 'Group name to execute the command as.'
    required: false
  env:
    description: 'Environment variables to pass to the remote command (one per line, KEY=VALUE or KEY format).'
    required: false

runs:
  using: "composite"
  steps:
    - name: Login to Alpacon
      run: |
        set -e
        alpacon login "${{ inputs.workspace-url }}" -t "${{ inputs.api-token }}"
      shell: bash
    - name: Execute Websh
      run: |
        set -e
        # Validate groupname requires username
        if [[ -z "${{ inputs.username }}" && -n "${{ inputs.groupname }}" ]]; then
          echo "Error: groupname requires username to be specified"
          exit 1
        fi

        # Build command args with optional flags
        CMD_ARGS=()
        if [[ -n "${{ inputs.username }}" ]]; then CMD_ARGS+=(-u "${{ inputs.username }}"); fi
        if [[ -n "${{ inputs.groupname }}" ]]; then CMD_ARGS+=(-g "${{ inputs.groupname }}"); fi
        if [[ -n '${{ inputs.env }}' ]]; then
          while IFS= read -r env_line || [[ -n "$env_line" ]]; do
            [[ -n "$env_line" ]] && CMD_ARGS+=(--env="$env_line")
          done <<< '${{ inputs.env }}'
        fi

        # Process multi-line script by executing each non-empty line
        while IFS= read -r line || [[ -n "$line" ]]; do
          # Skip empty lines and comments
          if [[ -n "$line" && ! "$line" =~ ^[[:space:]]*# ]]; then
            echo "Executing: $line"
            alpacon websh "${CMD_ARGS[@]}" "${{ inputs.target }}" "$line" || exit $?
          fi
        done <<< '${{ inputs.script }}'
      shell: bash
